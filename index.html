<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <title>Input Nilai UTS</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="./src/app.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            @keyframes fade {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                }
            }

            .animate-fade {
                animation: fade 0.3s ease-out;
            }
        </style>
    </head>

    <body class="bg-gray-100 min-h-screen font-[Inter] antialiased">
        <div
            class="bg-white rounded-xl shadow-md p-6 border border-gray-100 w-full md:max-w-4xl mx-auto my-10"
        >
            <h1 class="text-2xl font-bold mb-6">Input Nilai UTS</h1>

            <div class="grid grid-cols-3 gap-x-6 mb-6">
                <div>
                    <label class="text-sm text-gray-600">Kelas</label>
                    <select
                        id="kelas"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    ></select>
                </div>

                <div>
                    <label class="text-sm text-gray-600">Mapel</label>
                    <select
                        id="mapel"
                        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    ></select>
                </div>

                <div class="flex items-end">
                    <button
                        id="btnLoad"
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 hover:shadow hover:-translate-y-0.5 text-white font-medium rounded-lg py-2 transition duration-300 text-sm"
                    >
                        Tampilkan Siswa
                    </button>
                </div>
            </div>

            <div class="mb-2 text-sm text-gray-500">
                Total siswa: <span id="jumlah"></span>
            </div>

            <div id="tabel"></div>
        </div>
    </body>
</html>
