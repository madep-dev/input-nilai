<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <title>Input Nilai UTS</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="./src/app.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            @keyframes fade {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                }
            }

            .animate-fade {
                animation: fade 0.3s ease-out;
            }
        </style>
    </head>

    <body class="bg-gray-100 font-[Inter] antialiased">
        <div class="min-h-screen py-6 sm:py-10 px-4">
            <div
                class="w-full max-w-4xl mx-auto bg-white rounded-xl shadow-md border border-gray-100 p-5 sm:p-6"
            >
                <h1 class="text-xl sm:text-2xl font-bold mb-6">
                    Input Nilai PSAJ
                </h1>

                <!-- Form -->
                <div
                    class="grid gap-4 grid-cols-[repeat(auto-fit,minmax(180px,1fr))] items-end mb-6"
                >
                    <!-- Kelas -->
                    <div class="w-full">
                        <label class="text-sm text-gray-600">Kelas</label>
                        <select
                            id="kelas"
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        ></select>
                    </div>

                    <!-- Mapel -->
                    <div class="w-full">
                        <label class="text-sm text-gray-600">Mapel</label>
                        <select
                            id="mapel"
                            class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        ></select>
                    </div>

                    <!-- Button -->
                    <div class="w-full">
                        <button
                            id="btnLoad"
                            class="w-full px-5 py-2.5 bg-blue-600 hover:bg-blue-700 hover:shadow text-white font-medium rounded-lg transition duration-300 text-sm"
                        >
                            Tampilkan Siswa
                        </button>
                    </div>
                </div>

                <div class="mb-2 text-sm text-gray-500">
                    Total siswa: <span id="jumlah"></span>
                </div>

                <!-- tabel -->
                <div id="tabel" class="overflow-x-auto"></div>
            </div>
        </div>
    </body>
</html>
