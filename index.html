<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Input Nilai PSAJ</title>
        <link rel="icon" type="image/x-icon" href="./src/img/logo-mkm.ico" />
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="./src/app.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <style>
            @keyframes fade {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                }
            }

            .animate-fade {
                animation: fade 0.3s ease-out;
            }
        </style>
    </head>

    <body class="bg-gray-100 font-[Inter] antialiased">
        <div class="min-h-[94vh] py-6 sm:py-10 px-4">
            <div
                class="w-full max-w-4xl bg-white rounded-xl shadow-md p-4 sm:p-6 border border-gray-100 mx-auto"
            >
                <div class="flex items-center gap-x-2 mb-8">
                    <img src="./src/img/logo-mkm.png" alt="Logo" class="h-10" />
                    <div>
                        <p class="text-black font-semibold text-sm">
                            SMK Mitra Karya Mandiri
                        </p>
                        <p class="text-gray-500 text-xs">
                            Jl. Jend. Sudirman No.441, Ketanggungan
                        </p>
                    </div>
                </div>
                <h1
                    class="text-start text-lg sm:text-xl font-bold text-gray-800 mb-3"
                >
                    Input Nilai PSAJ
                </h1>

                <!-- Form -->
                <div
                    class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-6"
                >
                    <!-- Kelas -->
                    <div class="w-full">
                        <label class="text-sm text-gray-600">Kelas</label>
                        <select
                            id="kelas"
                            class="w-full border border-gray-300 rounded-lg p-2.5 text-sm transition"
                        ></select>
                    </div>

                    <!-- Mapel -->
                    <div class="w-full sm:col-span-1 md:col-span-2">
                        <label class="text-sm text-gray-600">Mapel</label>
                        <select
                            id="mapel"
                            class="w-full border border-gray-300 rounded-lg p-2.5 text-sm transition"
                        ></select>
                    </div>

                    <!-- Button -->
                    <div class="flex items-end">
                        <button
                            id="btnLoad"
                            class="w-full md:w-auto px-5 py-2.5 bg-sky-600 hover:bg-sky-700 hover:shadow hover:-translate-y-0.5 text-white font-medium rounded-lg transition duration-300 text-sm"
                        >
                            Tampilkan Siswa
                        </button>
                    </div>
                </div>

                <div class="mb-2 text-sm text-gray-600">
                    Total siswa:
                    <span id="jumlah" class="text-gray-800 font-semibold"
                        >0</span
                    >
                </div>

                <!-- tabel -->
                <div id="tabel" class="overflow-x-auto"></div>
            </div>
        </div>
        <footer class="mb-3">
            <p class="text-xs text-center">
                Created by
                <a
                    href="https://wa.me/6285216344445?text=Hallo%20Mamah%20Qonita%20dan%20Aghnia"
                    class="text-blue-500 hover:text-red-500 transition duration-200"
                >
                    Mamah ItaNia
                </a>
            </p>
        </footer>
    </body>
</html>
